<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Luquinha Games</title>

<link rel="icon" href="luquinha-games-icon-512.png">
<link rel="apple-touch-icon" href="luquinha-games-icon-512.png">
<meta name="theme-color" content="#00ff44">

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
text-align:center;
overflow-x:hidden;
}

header{
font-size:30px;
padding:20px;
font-weight:bold;
color:#00ff44;
text-shadow:0 0 10px #00ff44;
}

/* estrelas */

#estrelas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* perfil */

.perfil{
background:#0f172aee;
padding:20px;
margin:20px;
border-radius:20px;
box-shadow:0 0 20px #00ff44;
}

input{
padding:10px;
border-radius:10px;
border:none;
}

/* jogos */

.games{
display:grid;
grid-template-columns:1fr;
gap:20px;
padding:20px;
}

.game{
background:#111827;
border-radius:20px;
padding:20px;
box-shadow:0 0 15px #00ff44;
}

.emoji{
font-size:50px;
}

button{
margin-top:10px;
padding:10px 20px;
border-radius:10px;
border:none;
background:#00ff44;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#00cc33;
}

footer{
margin-top:20px;
opacity:0.7;
}

</style>

</head>

<body>

<canvas id="estrelas"></canvas>

<header>
🎮 Luquinha Games
</header>

<div class="perfil">

<h2>👤 Perfil do Jogador</h2>

<input id="nome" placeholder="Digite seu nome">

<br><br>

<button onclick="salvarPerfil()">Salvar</button>

<p id="info"></p>

</div>

<div class="games">

<div class="game">

<div class="emoji">🐹</div>

<h2>Capy Care</h2>

<button onclick="abrir('https://luquinha835.github.io/capy-care-')">
Jogar
</button>

</div>

<div class="game">

<div class="emoji">🧠</div>

<h2>Desafio Matemático</h2>

<button onclick="abrir('https://luquinha835.github.io/desfio-matematico')">
Jogar
</button>

</div>

<div class="game">

<div class="emoji">🔨</div>

<h2>Bater na Marmota</h2>

<button onclick="abrir('https://luquinha835.github.io/marmot-game')">
Jogar
</button>

</div>

</div>

<footer>

Luquinha Games ©

</footer>

<script>

/* abrir jogo */

function abrir(url){

window.open(url,"_blank")

}

/* perfil */

function salvarPerfil(){

let nome=document.getElementById("nome").value

localStorage.setItem("lg_nome",nome)

document.getElementById("info").innerText="Bem-vindo "+nome+" 🎮"

}

window.onload=function(){

let nome=localStorage.getItem("lg_nome")

if(nome){

document.getElementById("info").innerText="Bem-vindo de volta "+nome+" 🎮"

}

}

/* estrelas */

const canvas=document.getElementById("estrelas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let estrelas=[]

for(let i=0;i<120;i++){

estrelas.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2
})

}

function animar(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

for(let s of estrelas){

ctx.beginPath()
ctx.arc(s.x,s.y,s.r,0,Math.PI*2)
ctx.fill()

s.y+=0.3

if(s.y>canvas.height){

s.y=0
s.x=Math.random()*canvas.width

}

}

requestAnimationFrame(animar)

}

animar()

</script>

</body>
</html>
