<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Luquinha Games</title>

<link rel="manifest" href="manifest.json">

<link rel="icon" href="luquinha-games-icon-512.png">
<link rel="apple-touch-icon" href="luquinha-games-icon-512.png">

<meta name="theme-color" content="#00ff44">

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
text-align:center;
}

header{
font-size:30px;
padding:20px;
color:#00ff44;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
background:#00ff44;
font-weight:bold;
margin:10px;
}

.games{
padding:20px;
}

.game{
background:#111;
margin:15px;
padding:20px;
border-radius:15px;
}

</style>

</head>

<body>

<header>🎮 Luquinha Games</header>

<button id="installBtn" style="display:none;">📱 Instalar App</button>

<div class="games">

<div class="game">
<h2>🐹 Capy Care</h2>
<button onclick="abrir('https://luquinha835.github.io/capy-care-')">Jogar</button>
</div>

<div class="game">
<h2>🧠 Desafio Matemático</h2>
<button onclick="abrir('https://luquinha835.github.io/desfio-matematico')">Jogar</button>
</div>

<div class="game">
<h2>🔨 Bater na Marmota</h2>
<button onclick="abrir('https://luquinha835.github.io/marmot-game')">Jogar</button>
</div>

</div>

<script>

function abrir(url){
window.open(url,"_blank")
}

/* registrar service worker */

if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js")
}

/* botão instalar */

let deferredPrompt

window.addEventListener("beforeinstallprompt",(e)=>{

e.preventDefault()

deferredPrompt=e

document.getElementById("installBtn").style.display="block"

})

installBtn.onclick=()=>{

deferredPrompt.prompt()

}

</script>

</body>
</html>
