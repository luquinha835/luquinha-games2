<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Luquinha Games</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
text-align:center;
overflow-x:hidden;
}

/* fundo espacial */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* titulo */

h1{
margin-top:20px;
font-size:45px;
text-shadow:0 0 20px cyan;
}

/* login */

#loginBox{
margin-top:30px;
}

input{
padding:10px;
border:none;
border-radius:10px;
width:220px;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
background:#00ffff;
cursor:pointer;
font-weight:bold;
transition:.3s;
}

button:hover{
background:#00bbbb;
transform:scale(1.05);
}

/* perfil */

#profile{
margin:20px;
font-size:20px;
}

/* jogos */

.games{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:30px;
}

.card{
background:#111;
border-radius:15px;
padding:20px;
transition:.3s;
cursor:pointer;
box-shadow:0 0 15px rgba(0,255,255,.3);
}

.card:hover{
transform:scale(1.08);
box-shadow:0 0 30px cyan;
}

.icon{
font-size:70px;
}

/* estrelas */

.stars{
margin-top:10px;
}

.stars span{
font-size:22px;
cursor:pointer;
}

/* ranking */

#leaderboard{
background:#111;
margin:30px;
padding:20px;
border-radius:15px;
box-shadow:0 0 20px cyan;
}

#leaderboard h2{
margin-top:0;
}

li{
margin:8px;
}

</style>
</head>

<body>

<canvas id="space"></canvas>

Entrar

<!-- LEADERBOARD -->

<h2>🏆 Ranking Global</h2>

<ul id="rankList"></ul>

<script>

/* login */

let player=""

function login(){

player=document.getElementById("name").value

if(!player){
alert("Digite seu nome")
return
}

localStorage.setItem("player",player)

document.getElementById("profile").innerHTML=
"🧑‍🚀 Jogador: "+player

updateRank()

}

window.onload=function(){

player=localStorage.getItem("player")

if(player){

document.getElementById("profile").innerHTML=
"🧑‍🚀 Jogador: "+player

}

updateRank()

}

/* jogar */

function play(url,game){

let score=Math.floor(Math.random()*100)

let data=JSON.parse(localStorage.getItem("scores")||"[]")

data.push({
name:player || "Anônimo",
game:game,
score:score
})

localStorage.setItem("scores",JSON.stringify(data))

window.open(url,"_blank")

updateRank()

}

/* ranking */

function updateRank(){

let data=JSON.parse(localStorage.getItem("scores")||"[]")

data.sort((a,b)=>b.score-a.score)

let html=""

data.slice(0,10).forEach(p=>{

html+=`
<li>
${p.name} - ${p.game} (${p.score} pts)
</li>
`

})

document.getElementById("rankList").innerHTML=html

}

/* estrelas */

function rate(e,game,value){

e.stopPropagation()

localStorage.setItem("rate_"+game,value)

alert("Você avaliou "+value+" estrelas ⭐")

}

/* fundo espacial */

const canvas=document.getElementById("space")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let stars=[]

for(let i=0;i<150;i++){

stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2
})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

stars.forEach(s=>{

ctx.beginPath()
ctx.arc(s.x,s.y,s.r,0,Math.PI*2)
ctx.fill()

s.y+=0.3

if(s.y>canvas.height){
s.y=0
}

})

requestAnimationFrame(draw)

}

draw()

</script>

</body>
</html>
