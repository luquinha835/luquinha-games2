<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luquinha Games</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#000;
font-family:Arial;
color:white;
text-align:center;
overflow:hidden;
}

/* fundo animado */
body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:
radial-gradient(white 1px, transparent 1px);
background-size:40px 40px;
animation:stars 60s linear infinite;
opacity:0.3;
}

@keyframes stars{
from{transform:translateY(0);}
to{transform:translateY(-1000px);}
}

.box{
background:rgba(0,0,0,0.8);
padding:40px;
border-radius:20px;
border:2px solid #00ffcc;
box-shadow:0 0 20px #00ffcc;
}

h1{
margin-bottom:20px;
}

button{
padding:15px 30px;
margin:10px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.pc{
background:#00ff88;
}

.mobile{
background:#00aaff;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 15px white;
}

</style>
</head>

<body>

<div class="box">

<h1>🎮 Luquinha Games</h1>
<p>Qual é o seu dispositivo?</p>

<button class="pc" onclick="pc()">💻 PC / Notebook</button>

<button class="mobile" onclick="mobile()">📱 Celular</button>

</div>

<script>

function pc(){
window.location.href="https://luccabusscsm-creator.github.io/games";
}

function mobile(){
window.location.href="https://luquinha835.github.io/luquinha-games2";
}

</script>

</body>
</html>
